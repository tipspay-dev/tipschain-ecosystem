# Wallet Service - tipschain.sbs
# Place this in /etc/nginx/sites-available/tipschain.sbs

server {
    listen 80;
    listen [::]:80;
    server_name tipschain.sbs www.tipschain.sbs;
    
    # Redirect to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tipschain.sbs www.tipschain.sbs;

    # SSL Certificates
    ssl_certificate /etc/letsencrypt/live/tipschain.sbs/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tipschain.sbs/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/tipschain.sbs/chain.pem;

    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval' wss:" always;

    # Logging
    access_log /var/log/nginx/wallet-access.log main;
    error_log /var/log/nginx/wallet-error.log warn;

    # Rate limiting
    limit_req zone=wallet_limit burst=20 nodelay;

    # Proxy to Next.js backend
    location / {
        proxy_pass http://wallet_backend;
        proxy_http_version 1.1;
        
        # Connection headers
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Client information
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        
        # Cache bypass
        proxy_cache_bypass $http_upgrade;
    }

    # API endpoints
    location ~ ^/api/ {
        proxy_pass http://wallet_backend;
        proxy_http_version 1.1;
        
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Longer timeout for API calls
        proxy_read_timeout 120s;
        
        # Don't cache API responses
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # Static assets - cache aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://wallet_backend;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Disable access to hidden files
    location ~ /\. {
        deny all;
    }
}
