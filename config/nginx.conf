# Nginx Master Configuration - TipsChain Spaceship Deployment
# Place this in /etc/nginx/nginx.conf or reference individual site configs

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format with request time
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/atom+xml image/svg+xml;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=wallet_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=dex_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=explorer_limit:10m rate=10r/s;

    # Upstream definitions
    upstream wallet_backend {
        server wallet:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream dex_backend {
        server dex:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream explorer_backend {
        server explorer:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Include per-domain configurations
    include /etc/nginx/sites-enabled/*.conf;

    # Default server (catches undefined hosts)
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        location / {
            return 444;  # Close connection
        }
    }
}
