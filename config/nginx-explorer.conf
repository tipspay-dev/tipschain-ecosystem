# Block Explorer Service - scan.tipspay.org
# Place this in /etc/nginx/sites-available/scan.tipspay.org

server {
    listen 80;
    listen [::]:80;
    server_name scan.tipspay.org www.scan.tipspay.org;
    
    # Redirect to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name scan.tipspay.org www.scan.tipspay.org;

    # SSL Certificates
    ssl_certificate /etc/letsencrypt/live/scan.tipspay.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/scan.tipspay.org/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/scan.tipspay.org/chain.pem;

    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/explorer-access.log main;
    error_log /var/log/nginx/explorer-error.log warn;

    # Rate limiting - explorer can handle more requests
    limit_req zone=explorer_limit burst=50 nodelay;

    # Proxy to Next.js backend
    location / {
        proxy_pass http://explorer_backend;
        proxy_http_version 1.1;
        
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # API endpoints - search, blocks, transactions
    location ~ ^/api/ {
        proxy_pass http://explorer_backend;
        proxy_http_version 1.1;
        
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Cache explorer data for performance
        proxy_cache EXPLORER;
        proxy_cache_valid 200 10m;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        add_header X-Cache-Status $upstream_cache_status;
        
        proxy_read_timeout 120s;
    }

    # Static assets - cache long-term
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://explorer_backend;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Blockscout-compatible endpoints
    location ~ ^/(blocks|transactions|addresses|api-docs) {
        proxy_pass http://explorer_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
    }
}
