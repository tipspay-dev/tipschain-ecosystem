name: Build & Deploy TipsWallet

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run type check
        run: npm run lint

  build:
    name: Build & Test
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to VM
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
          VM_PORT: ${{ secrets.VM_PORT }}
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
          IMAGE_TAG: ${{ github.sha }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DOCKER_REGISTRY: ${{ env.REGISTRY }}
        run: |
          # Create temporary SSH key file
          mkdir -p ~/.ssh
          echo "$VM_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Add VM to known_hosts
          ssh-keyscan -p $VM_PORT -H $VM_HOST >> ~/.ssh/known_hosts 2>/dev/null
          
          # Copy docker-compose and .env to VM
          scp -P $VM_PORT -o StrictHostKeyChecking=no \
            docker-compose.yml \
            .env.example \
            $VM_USER@$VM_HOST:/opt/tipswallet/
          
          # Deploy on VM
          ssh -p $VM_PORT -o StrictHostKeyChecking=no $VM_USER@$VM_HOST << 'EOF'
            cd /opt/tipswallet
            
            # Pull latest image
            docker login -u $DOCKER_REGISTRY_USER -p $DOCKER_REGISTRY_TOKEN ghcr.io
            docker compose pull
            
            # Deploy with new image
            DOCKER_IMAGE=$DOCKER_REGISTRY/$IMAGE_NAME:main \
            GEMINI_API_KEY=$GEMINI_API_KEY \
            docker compose up -d
            
            # Check health
            sleep 10
            docker compose ps
            docker compose logs --tail=20
          EOF
      
      - name: Verify Deployment
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_PORT: ${{ secrets.VM_PORT }}
          VM_USER: ${{ secrets.VM_USER }}
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$VM_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p $VM_PORT -H $VM_HOST >> ~/.ssh/known_hosts 2>/dev/null
          
          ssh -p $VM_PORT -o StrictHostKeyChecking=no $VM_USER@$VM_HOST \
            'curl -f http://localhost:3000/ || exit 1'
      
      - name: Slack Notification
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "TipsWallet Deployment",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*TipsWallet Deployment*\nStatus: ${{ job.status }}\nCommit: ${{ github.sha }}\nBranch: ${{ github.ref_name }}"
                  }
                }
              ]
            }
